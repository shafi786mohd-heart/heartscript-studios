    // A modular, dynamic icon wrapper component that leverages Lucide CDN on-the-fly
    function LucideIcon({ name, className = "" }) {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name, className]);
      return <i data-lucide={name} className={className}></i>;
    }

    // Standard platform url embed parsers
    const getEmbedUrl = (url) => {
      if (!url) return "";
      const clean = url.trim();

      if (clean.includes("spotify.com")) {
        if (clean.includes("/embed")) return clean;
        return clean.replace("open.spotify.com/", "open.spotify.com/embed/");
      }
      if (clean.includes("youtube.com") || clean.includes("youtu.be")) {
        if (clean.includes("/embed")) return clean;
        let vidId = "";
        if (clean.includes("v=")) vidId = clean.split("v=")[1]?.split(/[&?]/)[0];
        else if (clean.includes("youtu.be/")) vidId = clean.split("youtu.be/")[1]?.split(/[?]/)[0];
        return vidId ? `https://www.youtube.com/embed/${vidId}` : clean;
      }
      if (clean.includes("soundcloud.com")) {
        if (clean.includes("w.soundcloud.com")) return clean;
        return `https://w.soundcloud.com/player/?url=${encodeURIComponent(clean)}&color=%23f43f5e&auto_play=false`;
      }
      return clean;
    };

    const getPlatformKey = (url) => {
      if (!url) return null;
      const lower = url.toLowerCase();
      if (lower.includes("spotify.com")) return "spotify";
      if (lower.includes("youtube.com") || lower.includes("youtu.be")) return "youtube";
      if (lower.includes("soundcloud.com")) return "soundcloud";
      if (lower.includes("apple.com")) return "appleMusic";
      return "generic";
    };

    // ==========================================
    // VISUAL ENGINE (KINETIC VIDEO BUILDER)
    // ==========================================
    function VisualEngine() {
      const [title, setTitle] = useState("Vapor Resonance");
      const [lyrics, setLyrics] = useState(
        "Lost in the waves of a digital night\nYour signal is fading, but burning so bright\nThrough the static and screens I hear your call\nBut the wireframe skies are starting to fall"
      );
      const [selectedTheme, setSelectedTheme] = useState("crimson-ink");
      const [visualizationCanvas, setVisualizationCanvas] = useState("static");
      const [generating, setGenerating] = useState(false);
      const [generationSteps, setGenerationSteps] = useState("");
      
      const [fontSize, setFontSize] = useState(24);
      const [lyricAlignment, setLyricAlignment] = useState("center");
      const [customPrompt, setCustomPrompt] = useState("");
      const [refining, setRefining] = useState(false);

      const [playing, setPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const canvasRef = useRef(null);
      const audioRef = useRef(null);
      const audioInputRef = useRef(null);
      const fileInputRef = useRef(null);

      const [audioUrl, setAudioUrl] = useState("");
      const [audioName, setAudioName] = useState("Silent Studio Loop");
      const [audioFileError, setAudioFileError] = useState(null);
      const [reelDuration, setReelDuration] = useState(8.0);
      const [artworkUrl, setArtworkUrl] = useState("https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=600");
      const [dragActive, setDragActive] = useState(false);
      const [artworkFileError, setArtworkFileError] = useState(null);

      const [suggestion, setSuggestion] = useState(null);

      const artworkPresets = [
        { name: "Cosmic Synth", url: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=600" },
        { name: "Velvet Rose", url: "https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=600" },
        { name: "Neo Tokyo", url: "https://images.unsplash.com/photo-1542204172-e7052809a862?w=600" },
        { name: "Acoustic Sun", url: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=600" }
      ];

      const audioPresets = [
        { name: "Lofi Ambient Beat", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
        { name: "Neon Synth Loop", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
        { name: "Cinematic Echoes", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
      ];

      // Auto generate layout configuration on changes
      useEffect(() => {
        generateSmartLayout();
      }, [selectedTheme, reelDuration, lyrics, title]);

      const generateSmartLayout = () => {
        const lines = lyrics.split("\n").filter(l => l.trim().length > 0).slice(0, 6);
        const lineCount = lines.length || 1;
        const timePerLine = reelDuration / lineCount;
        const mockTiming = lines.map((line, i) => ({
          start: Number((i * timePerLine).toFixed(1)),
          end: Number(((i + 1) * timePerLine).toFixed(1)),
          text: line.trim()
        }));

        const themeAccents = {
          "crimson-ink": "#ef4444",
          "cyan-static": "#06b6d4",
          "cream-paper": "#d97706",
          "prism-gold": "#fbbf24",
          "cosmic-neon": "#f43f5e"
        };

        const themeGradients = {
          "crimson-ink": ["#120303", "#050101"],
          "cyan-static": ["#030f14", "#010507"],
          "cream-paper": ["#faf9f5", "#f1ebd9"],
          "prism-gold": ["#16120a", "#080603"],
          "cosmic-neon": ["#12041e", "#05010a"]
        };

        setSuggestion({
          lyricsTiming: mockTiming,
          backgroundGradient: themeGradients[selectedTheme] || ["#120303", "#050101"],
          suggestedAccentColor: themeAccents[selectedTheme] || "#a855f7",
          visualVibeDescription: `Symmetric layout calculated for '${title}' in the '${selectedTheme}' template. Kinetic transitions are mapped to word clusters.`,
          typographySpacing: selectedTheme === "prism-gold" ? "tracking-widest uppercase font-serif" : "tracking-wider leading-relaxed uppercase",
          motionSpeed: selectedTheme === "cosmic-neon" ? "pulse-fast" : "pulse-slow"
        });
      };

      // Simulated Gemini design helper
      const handleGenerateDesign = () => {
        if (!title.trim() || !lyrics.trim()) return;
        setGenerating(true);
        const steps = [
          "Parsing track phonetics...",
          "Calculating contrast bounds...",
          "Applying Gemini spatial grids...",
          "Syncing visual boundaries..."
        ];

        let index = 0;
        const interval = setInterval(() => {
          if (index < steps.length) {
            setGenerationSteps(steps[index]);
            index++;
          } else {
            clearInterval(interval);
            setGenerating(false);
            generateSmartLayout();
          }
        }, 500);
      };

      // Simulated refinement prompt response
      const handleRefineLyrics = () => {
        if (!customPrompt.trim()) return;
        setRefining(true);
        setTimeout(() => {
          setRefining(false);
          const lines = lyrics.split("\n");
          if (lines.length > 0) {
            setLyrics(lines.map(l => `${l} (Remix Study Hook)`).join("\n"));
          }
          setCustomPrompt("");
          generateSmartLayout();
        }, 1500);
      };

      // Playback simulation ticker
      useEffect(() => {
        let ticker = null;
        if (playing) {
          if (audioUrl && audioRef.current) {
            audioRef.current.play().catch(e => console.log(e));
            ticker = setInterval(() => {
              if (audioRef.current) {
                const cur = audioRef.current.currentTime;
                if (cur >= reelDuration) {
                  audioRef.current.currentTime = 0;
                  setCurrentTime(0);
                } else {
                  setCurrentTime(Number(cur.toFixed(1)));
                }
              }
            }, 50);
          } else {
            ticker = setInterval(() => {
              setCurrentTime((prev) => {
                if (prev >= reelDuration - 0.1) return 0;
                return Number((prev + 0.1).toFixed(1));
              });
            }, 100);
          }
        } else {
          if (audioRef.current) {
            audioRef.current.pause();
          }
        }
        return () => {
          if (ticker) clearInterval(ticker);
        };
      }, [playing, audioUrl, reelDuration]);

      const handleAudioUpload = (e) => {
        if (e.target.files && e.target.files[0]) {
          const file = e.target.files[0];
          if (!file.type.startsWith("audio/")) {
            setAudioFileError("Please upload a valid audio file.");
            return;
          }
          setAudioFileError(null);
          setAudioName(file.name);
          setPlaying(false);
          setCurrentTime(0);
          const url = URL.createObjectURL(file);
          setAudioUrl(url);
          if (audioRef.current) {
            audioRef.current.src = url;
            audioRef.current.load();
          }
        }
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          const file = e.dataTransfer.files[0];
          if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = (ev) => setArtworkUrl(ev.target.result);
            reader.readAsDataURL(file);
          }
        }
      };

      const handleFileInputChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          const file = e.target.files[0];
          const reader = new FileReader();
          reader.onload = (ev) => setArtworkUrl(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      // 1080x1920 HD Canvas Wallpaper generation & export
      const handleDownloadAsset = async () => {
        const canvas = canvasRef.current;
        if (!canvas || !suggestion) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        const width = 1080;
        const height = 1920;
        canvas.width = width;
        canvas.height = height;

        // Linear Gradient
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, suggestion.backgroundGradient[0] || "#111");
        grad.addColorStop(1, suggestion.backgroundGradient[1] || "#000");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        // Tech grid lines if cyan static theme
        if (selectedTheme === "cyan-static") {
          ctx.strokeStyle = "rgba(6, 182, 212, 0.08)";
          ctx.lineWidth = 2;
          const gridSize = 80;
          for (let x = 0; x < width; x += gridSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
          }
          for (let y = 0; y < height; y += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
          }
        }

        // Title and credits
        ctx.textAlign = "center";
        ctx.fillStyle = selectedTheme === "cream-paper" ? "#222" : "rgba(255, 255, 255, 0.4)";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText("HEARTSCRIPT STUDIOS CREATORS SUITE", width / 2, 180);

        ctx.fillStyle = suggestion.suggestedAccentColor;
        ctx.font = selectedTheme === "cream-paper" ? "italic bold 64px serif" : "bold 64px sans-serif";
        ctx.fillText(title.toUpperCase(), width / 2, 280);

        // Render Artwork
        let artworkDrawn = false;
        const artSize = 480;
        const artX = width / 2 - artSize / 2;
        const artY = 460;

        if (artworkUrl) {
          try {
            const img = await new Promise((resolve, reject) => {
              const imageObj = new Image();
              imageObj.crossOrigin = "anonymous";
              imageObj.onload = () => resolve(imageObj);
              imageObj.onerror = () => reject(new Error("Failed image load"));
              imageObj.src = artworkUrl;
            });

            ctx.save();
            if (visualizationCanvas === "reel") {
              // Draw cassette outer body (rounded rect)
              const rectWidth = 560;
              const rectHeight = 360;
              const rectX = width / 2 - rectWidth / 2;
              const rectY = 520;
              
              ctx.fillStyle = "#171717";
              ctx.strokeStyle = "#262626";
              ctx.lineWidth = 12;
              ctx.beginPath();
              if (ctx.roundRect) {
                ctx.roundRect(rectX, rectY, rectWidth, rectHeight, 24);
              } else {
                ctx.rect(rectX, rectY, rectWidth, rectHeight);
              }
              ctx.fill();
              ctx.stroke();
              
              // Draw Sticker Label
              const labelWidth = 500;
              const labelHeight = 180;
              const labelX = width / 2 - labelWidth / 2;
              const labelY = rectY + 30;
              
              ctx.fillStyle = "#262626";
              ctx.beginPath();
              if (ctx.roundRect) {
                ctx.roundRect(labelX, labelY, labelWidth, labelHeight, 12);
              } else {
                ctx.rect(labelX, labelY, labelWidth, labelHeight);
              }
              ctx.fill();
              
              // Draw artwork inside sticker label
              ctx.save();
              ctx.beginPath();
              if (ctx.roundRect) {
                ctx.roundRect(labelX + 20, labelY + 20, 140, 140, 8);
              } else {
                ctx.rect(labelX + 20, labelY + 20, 140, 140);
              }
              ctx.clip();
              ctx.drawImage(img, labelX + 20, labelY + 20, 140, 140);
              ctx.restore();
              
              // Sticker Text details
              ctx.fillStyle = "#ffffff";
              ctx.textAlign = "left";
              ctx.font = "bold 32px sans-serif";
              ctx.fillText(title.toUpperCase().slice(0, 18), labelX + 180, labelY + 70);
              ctx.fillStyle = "#a3a3a3";
              ctx.font = "bold 20px monospace";
              ctx.fillText("HEARTSCRIPT C-60", labelX + 180, labelY + 115);
              ctx.fillText("SIDE A", labelX + 180, labelY + 145);
              
              // Center Window for Reels
              const winWidth = 320;
              const winHeight = 90;
              const winX = width / 2 - winWidth / 2;
              const winY = rectY + 230;
              
              ctx.fillStyle = "#0a0a0a";
              ctx.strokeStyle = "#404040";
              ctx.lineWidth = 4;
              ctx.beginPath();
              if (ctx.roundRect) {
                ctx.roundRect(winX, winY, winWidth, winHeight, 8);
              } else {
                ctx.rect(winX, winY, winWidth, winHeight);
              }
              ctx.fill();
              ctx.stroke();
              
              // Draw the two reels
              const drawReelWheel = (cX, cY) => {
                ctx.save();
                ctx.translate(cX, cY);
                ctx.strokeStyle = "#525252";
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(0, 0, 32, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = "#1c1c1c";
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = "#525252";
                ctx.lineWidth = 4;
                for (let d = 0; d < 360; d += 60) {
                  const rad = (d * Math.PI) / 180;
                  ctx.beginPath();
                  ctx.moveTo(Math.cos(rad) * 15, Math.sin(rad) * 15);
                  ctx.lineTo(Math.cos(rad) * 32, Math.sin(rad) * 32);
                  ctx.stroke();
                }
                ctx.restore();
              };
              
              drawReelWheel(width / 2 - 80, winY + winHeight / 2);
              drawReelWheel(width / 2 + 80, winY + winHeight / 2);
            } else if (visualizationCanvas === "spin") {
              const vSize = 540;
              const vX = width / 2;
              const vY = 700;
              
              ctx.fillStyle = "#0a0a0a";
              ctx.beginPath();
              ctx.arc(vX, vY, vSize / 2, 0, Math.PI * 2);
              ctx.fill();
              
              ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
              ctx.lineWidth = 2;
              for (let r = 80; r < vSize / 2; r += 25) {
                ctx.beginPath();
                ctx.arc(vX, vY, r, 0, Math.PI * 2);
                ctx.stroke();
              }
              
              ctx.fillStyle = "#1e1e1e";
              ctx.beginPath();
              ctx.arc(vX, vY, 110, 0, Math.PI * 2);
              ctx.fill();
              
              ctx.save();
              ctx.beginPath();
              ctx.arc(vX, vY, 100, 0, Math.PI * 2);
              ctx.clip();
              ctx.drawImage(img, vX - 100, vY - 100, 200, 200);
              ctx.restore();
              
              ctx.fillStyle = "#000000";
              ctx.strokeStyle = "#404040";
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(vX, vY, 12, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
            } else if (visualizationCanvas === "pulse") {
              const artSize = 480;
              const artX = width / 2 - artSize / 2;
              const artY = 460;
              
              ctx.strokeStyle = "rgba(244, 63, 94, 0.2)";
              ctx.lineWidth = 4;
              ctx.beginPath();
              ctx.arc(width / 2, artY + artSize / 2, 360, 0, Math.PI * 2);
              ctx.stroke();
              
              ctx.strokeStyle = "rgba(244, 63, 94, 0.15)";
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(width / 2, artY + artSize / 2, 420, 0, Math.PI * 2);
              ctx.stroke();
              
              ctx.fillStyle = "rgba(244, 63, 94, 0.4)";
              ctx.font = "bold 32px sans-serif";
              ctx.fillText("♥", width / 2 - 300, artY + 100);
              ctx.fillText("♥", width / 2 + 300, artY + artSize - 100);
              
              ctx.shadowColor = "rgba(244, 63, 94, 0.3)";
              ctx.shadowBlur = 45;
              ctx.drawImage(img, artX, artY, artSize, artSize);
            } else {
              ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
              ctx.shadowBlur = 40;
              ctx.drawImage(img, artX, artY, artSize, artSize);
            }
            ctx.restore();
            artworkDrawn = true;
          } catch (err) {
            console.log(err);
          }
        }

        // Draw Active Lyrics
        const activeLyricObj = suggestion.lyricsTiming.find(
          t => currentTime >= t.start && currentTime < t.end
        );
        const activeText = activeLyricObj ? activeLyricObj.text : "Heartscript Studios Visualizer";
        
        ctx.fillStyle = selectedTheme === "cream-paper" ? "#111" : "#ffffff";
        ctx.font = `bold ${fontSize * 2}px sans-serif`;

        let yPos = height / 2 + 250;
        if (lyricAlignment === "top") yPos = height / 3 + 200;
        if (lyricAlignment === "bottom") yPos = (height * 3) / 4 + 100;

        ctx.fillText(activeText, width / 2, yPos);

        // Watermark tag
        ctx.fillStyle = selectedTheme === "cream-paper" ? "rgba(0,0,0,0.3)" : "rgba(255,255,255,0.2)";
        ctx.font = "24px sans-serif";
        ctx.fillText("STREAMING LIVE IN STORES", width / 2, height - 160);

        // Auto download trigger
        const dataUrl = canvas.toDataURL("image/png");
        const downloadLink = document.createElement("a");
        downloadLink.download = `${title.toLowerCase().replace(/\s+/g, "-")}-standalone.png`;
        downloadLink.href = dataUrl;
        downloadLink.click();
      };

      const activeLyricObj = suggestion?.lyricsTiming.find(
        t => currentTime >= t.start && currentTime < t.end
      );

      return (
        <div className="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-10 text-left items-start relative z-10">
          
          {/* Offscreen rendering anchor */}
          <canvas ref={canvasRef} className="hidden" />
          
          {/* Audio stream tag */}
          <audio ref={audioRef} loop />

          {/* Configuration Panels (Left 7-columns) */}
          <div className="lg:col-span-7 space-y-8 bg-neutral-900/40 border border-neutral-800 p-8 rounded-3xl backdrop-blur-md shadow-xl">
            <div>
              <h2 className="text-2xl font-display font-bold text-white flex items-center gap-2">
                <LucideIcon name="sparkles" className="w-5 h-5 text-rose-500 animate-pulse" />
                <span>HeartVision</span>
              </h2>
              <p className="text-xs text-neutral-400 mt-1">
                Customize templates, layout dynamics, and lyrics synchronization offline.
              </p>
            </div>

            {/* Aesthetic Selector */}
            <div className="space-y-3">
              <label className="text-xs font-mono uppercase tracking-wider text-neutral-450">Signature Preset Style</label>
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">
                {[
                  { id: "crimson-ink", name: "Crimson Ink" },
                  { id: "cyan-static", name: "Cyan Static" },
                  { id: "cream-paper", name: "Cream Paper" },
                  { id: "prism-gold", name: "Prism Gold" },
                  { id: "cosmic-neon", name: "Cosmic Neon" }
                ].map((th) => (
                  <button
                    key={th.id}
                    id={`theme-select-${th.id}`}
                    onClick={() => setSelectedTheme(th.id)}
                    className={`py-3.5 px-1 rounded-xl border text-[11px] font-semibold text-center transition-all cursor-pointer ${
                      selectedTheme === th.id 
                        ? `border-rose-500 ring-2 ring-rose-500/20 bg-rose-500/10 text-white` 
                        : "border-neutral-800 hover:bg-neutral-850 text-neutral-400"
                    }`}
                  >
                    {th.name}
                  </button>
                ))}
              </div>

    // ==========================================
    // HEARTLINKS SUITE (SMART FAN ROUTING)
    // ==========================================
    function HeartLinksSuite({ heartLinks, setHeartLinks, onNavigateToSlug }) {
      const [publishSuccess, setPublishSuccess] = useState(null);

      // Core custom forms
      const [title, setTitle] = useState("");
      const [artist, setArtist] = useState("");
      const [slug, setSlug] = useState("");
      const [imageUrl, setImageUrl] = useState("https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=600");
      const [description, setDescription] = useState("");
      const [theme, setTheme] = useState("crimson-ink");

      const [links, setLinks] = useState({
        spotify: "",
        youtube: "",
        appleMusic: "",
        soundcloud: ""
      });

      const [selectedAnalyticsLink, setSelectedAnalyticsLink] = useState(null);
      const [copiedSlug, setCopiedSlug] = useState(null);
      const [suiteRightTab, setSuiteRightTab] = useState("preview"); // "preview" or "analytics"

      // Odesli integration state
      const [pasteUrl, setPasteUrl] = useState("");
      const [fetchingOdesli, setFetchingOdesli] = useState(false);
      const [odesliError, setOdesliError] = useState("");

      const handleOdesliFetch = async () => {
        if (!pasteUrl.trim()) return;
        setFetchingOdesli(true);
        setOdesliError("");
        try {
          const response = await fetch(`/api/odesli?url=${encodeURIComponent(pasteUrl.trim())}`);
          if (!response.ok) {
            throw new Error(`API responded with status code ${response.status}. Please enter details manually below.`);
          }
          
          let data;
          try {
            data = await response.json();
            // 1) Clear and explicit console log when Odesli responds
            console.log("Odesli API responds:", data);
          } catch (jsonErr) {
            console.error("JSON parsing error on Odesli response:", jsonErr);
            throw new Error("Odesli API returned an invalid response structure. You can enter details manually below.");
          }

          // 2) Safety verification and fallbacks if parsing fails inside the sandbox
          if (!data || typeof data !== "object") {
            throw new Error("Empty or invalid response from Odesli API. Please input your details manually below.");
          }

          let mainEntity = null;
          try {
            if (data.entityUniqueId && data.entitiesByUniqueId) {
              mainEntity = data.entitiesByUniqueId[data.entityUniqueId];
            }
            if (!mainEntity && data.entitiesByUniqueId) {
              mainEntity = Object.values(data.entitiesByUniqueId)[0];
            }
          } catch (parseEntityErr) {
            console.error("Error safely parsing unique entities from Odesli:", parseEntityErr);
          }
          
          if (!mainEntity) {
            throw new Error("Could not auto-extract song details from this link. Feel free to type them manually below.");
          }

          // 3) Layout updates properly using react hooks when a valid response comes in
          const fetchedTitle = mainEntity.title || "";
          const fetchedArtist = mainEntity.artistName || "";
          
          setTitle(fetchedTitle);
          setArtist(fetchedArtist);
          
          if (mainEntity.thumbnailUrl) {
            setImageUrl(mainEntity.thumbnailUrl);
          }
          
          const newLinks = {
            spotify: "",
            youtube: "",
            appleMusic: "",
            soundcloud: ""
          };

          try {
            if (data.linksByPlatform) {
              newLinks.spotify = data.linksByPlatform.spotify?.url || "";
              newLinks.youtube = data.linksByPlatform.youtube?.url || data.linksByPlatform.youtubeMusic?.url || "";
              newLinks.appleMusic = data.linksByPlatform.appleMusic?.url || data.linksByPlatform.itunes?.url || "";
              newLinks.soundcloud = data.linksByPlatform.soundcloud?.url || "";
            }
          } catch (parseLinksErr) {
            console.error("Error parsing platform links from Odesli:", parseLinksErr);
          }
          
          // Keep user's pasted URL in correct slot if Odesli results do not include it
          const lowerUrl = pasteUrl.toLowerCase();
          if (lowerUrl.includes("spotify.com") && !newLinks.spotify) {
            newLinks.spotify = pasteUrl.trim();
          } else if ((lowerUrl.includes("youtube.com") || lowerUrl.includes("youtu.be")) && !newLinks.youtube) {
            newLinks.youtube = pasteUrl.trim();
          } else if (lowerUrl.includes("apple.com") && !newLinks.appleMusic) {
            newLinks.appleMusic = pasteUrl.trim();
          } else if (lowerUrl.includes("soundcloud.com") && !newLinks.soundcloud) {
            newLinks.soundcloud = pasteUrl.trim();
          }

          setLinks(newLinks);
          
          if (fetchedTitle && fetchedArtist) {
            setDescription(`Listen to '${fetchedTitle}' by ${fetchedArtist} on your preferred streaming platform.`);
          } else {
            setDescription("Listen to our new digital release out now on all major streaming platforms.");
          }
        } catch (err) {
          console.error("Odesli Fetch Error:", err);
          setOdesliError(err instanceof Error ? err.message : "Failed to fetch from Odesli API. Feel free to type details manually below.");
        } finally {
          setFetchingOdesli(false);
        }
      };

      // Auto generator for slug from title as they type
      useEffect(() => {
        if (title) {
          const autoSlug = title.toLowerCase()
            .trim()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/(^-|-$)/g, "");
          setSlug(autoSlug);
        } else {
          setSlug("");
        }
      }, [title]);

      useEffect(() => {
        if (heartLinks.length > 0 && !selectedAnalyticsLink) {
          setSelectedAnalyticsLink(heartLinks[0]);
        }
      }, [heartLinks]);

      // Publish Smart Link to Local state
      const handlePublishLink = () => {
        if (!slug.trim() || !title.trim() || !artist.trim()) return;

        const cleanSlug = slug.trim().toLowerCase().replace(/[^a-z0-9-_]/g, "");
        const newLink = {
          slug: cleanSlug,
          title: title.trim(),
          artist: artist.trim(),
          imageUrl: imageUrl.trim() || "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=600",
          theme,
          description: description.trim(),
          links,
          views: 0,
          clicks: { spotify: 0, youtube: 0, appleMusic: 0, soundcloud: 0 },
          createdAt: new Date().toISOString()
        };

        const updated = [newLink, ...heartLinks];

      const [linkData, setLinkData] = useState(null);
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        const found = heartLinks.find(l => l.slug === slug);
        if (found) {
          setLinkData(found);
          // Auto increment view views locally for mock analytics

    function RosterCommunity({ allTracks, setAllTracks, comments, setComments }) {
      const [activeTrack, setActiveTrack] = useState(null);
      const [activeTab, setActiveTab] = useState("player");
      const [searchQuery, setSearchQuery] = useState("");
      
      const [songTitle, setSongTitle] = useState("");
      const [artistName, setArtistName] = useState("");
      const [songUrl, setSongUrl] = useState("");
      const [notes, setNotes] = useState("");
      const [submittedBy, setSubmittedBy] = useState("");
      const [licenseKey, setLicenseKey] = useState("");
      
      const [formError, setFormError] = useState(null);
      const [formSuccess, setFormSuccess] = useState(false);

      const [commentAuthor, setCommentAuthor] = useState("");
      const [commentContent, setCommentContent] = useState("");
      const [commentRating, setCommentRating] = useState(5);

      useEffect(() => {
        if (allTracks.length > 0 && !activeTrack) {
          setActiveTrack(allTracks[0]);
        }
      }, [allTracks]);

      const getEmbedUrl = (url) => {
        if (!url) return "";
        const clean = url.trim();

        if (clean.includes("spotify.com")) {
          return clean.replace("open.spotify.com/", "open.spotify.com/embed/");
        }
        if (clean.includes("youtube.com") || clean.includes("youtu.be")) {
          let vidId = "";
          if (clean.includes("v=")) vidId = clean.split("v=")[1]?.split(/[&?]/)[0];
          else if (clean.includes("youtu.be/")) vidId = clean.split("youtu.be/")[1]?.split(/[?]/)[0];
          return vidId ? `https://www.youtube.com/embed/${vidId}` : clean;
        }
        if (clean.includes("soundcloud.com")) {
          return `https://w.soundcloud.com/player/?url=${encodeURIComponent(clean)}&color=%23f43f5e&auto_play=false`;
        }
        return clean;
      };

      const getPlatformKey = (url) => {
        if (url.includes("spotify.com")) return "spotify";
        if (url.includes("youtube.com") || url.includes("youtu.be")) return "youtube";
        if (url.includes("soundcloud.com")) return "soundcloud";
        return "generic";
      };

      const handleFormSubmit = (e) => {
        e.preventDefault();
        setFormError(null);
        if (!songTitle || !artistName || !songUrl) {
          setFormError("Fill out all parameters marked with *");
          return;
        }

        const newTrack = {
          id: `track_local_${Date.now()}`,
          title: songTitle,
          artist: artistName,
          genre: "Ambient Vibe",
          url: songUrl,
          submittedBy: submittedBy || artistName,
          notes: notes || "Autonomous release. Listen below!"
        };

        const updated = [newTrack, ...allTracks];
        setAllTracks(updated);
        localStorage.setItem("heartscript_submitted_tracks", JSON.stringify(updated));

        setActiveTrack(newTrack);
        setFormSuccess(true);
        setSongTitle(""); setArtistName(""); setSongUrl(""); setNotes(""); setSubmittedBy("");

        setTimeout(() => {
          setActiveTab("player");
          setFormSuccess(false);
        }, 1200);
      };

      const handleCommentSubmit = (e) => {
        e.preventDefault();
        if (!commentAuthor || !commentContent || !activeTrack) return;

        const newComment = {
          id: `comment_${Date.now()}`,
          trackId: activeTrack.id,
          author: commentAuthor,
          content: commentContent,
          rating: commentRating,
          createdAt: new Date().toISOString()
        };

        const updated = [newComment, ...comments];
        setComments(updated);
        localStorage.setItem("heartscript_track_comments", JSON.stringify(updated));

        setCommentAuthor("");
        setCommentContent("");
        setCommentRating(5);
      };

      const filteredTracks = allTracks.filter(t => 
        t.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        t.artist.toLowerCase().includes(searchQuery.toLowerCase()) ||
        t.genre.toLowerCase().includes(searchQuery.toLowerCase())
      );

      const activeComments = comments.filter(c => c.trackId === activeTrack?.id);

      return (
        <div className="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-10 text-left items-start relative z-10">
          
          <div className="lg:col-span-7 space-y-6">

                <button onClick={() => setActiveTab("player")} className={`pb-4 text-xs font-bold uppercase tracking-wider transition ${activeTab === "player" ? "text-rose-500 border-b-2 border-rose-500" : "text-neutral-500"}`}>

                  Submit Song Showcase

              </div>
            </div>

            {activeTab === "player" && activeTrack && (
              <div className="bg-neutral-900/40 border border-neutral-800 p-6 rounded-3xl relative overflow-hidden space-y-5">
                <div>
                  <span className="text-[10px] font-mono text-rose-450 uppercase px-2 py-0.5 rounded bg-rose-500/10 border border-rose-500/20">{activeTrack.genre}</span>
                  <h3 className="text-xl font-display font-extrabold text-white mt-2 leading-tight">{activeTrack.title}</h3>
                  <p className="text-xs text-neutral-400 mt-0.5">By <span className="font-semibold text-neutral-200">{activeTrack.artist}</span></p>
                  <p className="text-xs text-neutral-400 font-sans leading-relaxed mt-2.5">"{activeTrack.notes}"</p>
                </div>

                <div className="w-full bg-black/60 rounded-xl overflow-hidden border border-neutral-800 shadow-2xl">
                  {getPlatformKey(activeTrack.url) === "spotify" ? (
                    <iframe src={getEmbedUrl(activeTrack.url)} width="100%" height="152" allow="encrypted-media" className="block border-0" />
                  ) : getPlatformKey(activeTrack.url) === "youtube" ? (
                    <div className="relative w-full aspect-video">
                      <iframe src={getEmbedUrl(activeTrack.url)} className="absolute inset-0 w-full h-full border-0" allowFullScreen />
                    </div>
                  ) : (
                    <iframe src={getEmbedUrl(activeTrack.url)} width="100%" height="166" className="block border-0" />
                  )}
                </div>
              </div>
            )}

            {activeTab === "submit" && (
              <form onSubmit={handleFormSubmit} className="bg-neutral-900/40 border border-neutral-800 p-6 rounded-3xl space-y-4">
                <h3 className="text-sm font-mono text-white">SUBMISSION COORD SHEET</h3>
                
                <div className="grid grid-cols-2 gap-4">
                  <div className="space-y-1">
                    <span className="text-[10px] font-mono text-neutral-400">SONG TITLE *</span>
                    <input required type="text" value={songTitle} onChange={e => setSongTitle(e.target.value)} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-white" />
                  </div>
                  <div className="space-y-1">
                    <span className="text-[10px] font-mono text-neutral-400">ARTIST NAME *</span>
                    <input required type="text" value={artistName} onChange={e => setArtistName(e.target.value)} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-white" />
                  </div>
                </div>

                <div className="space-y-1">
                  <span className="text-[10px] font-mono text-neutral-400">STREAMING EMBED LINK *</span>
                  <input required type="text" value={songUrl} onChange={e => setSongUrl(e.target.value)} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3 py-2.5 text-xs text-white" placeholder="Spotify/YouTube URL" />
                </div>

                <div className="space-y-1">
                  <span className="text-[10px] font-mono text-neutral-400">ARTIST NOTES</span>
                  <textarea rows={2} value={notes} onChange={e => setNotes(e.target.value)} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3.5 py-2 text-xs text-white" />
                </div>

                {formSuccess && <p className="text-xs text-emerald-400">Added to The Pulse! Redirecting...</p>}

                <button type="submit" className="w-full py-3 bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold rounded-xl uppercase tracking-wider flex items-center justify-center gap-1.5 cursor-pointer">
                  <LucideIcon name="send" className="w-4 h-4" />
                  <span>Submit Showcase Track</span>
                </button>
              </form>
            )}

            {/* Roster list */}
            <div className="space-y-4">
              <div className="flex justify-between items-center">
                <span className="text-xs font-mono uppercase tracking-wider text-neutral-400">The Pulse Feed</span>
                <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-1.5 text-xs text-white" placeholder="Search the pulse..." />
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {filteredTracks.map(t => (
                  <div
                    key={t.id}
                    onClick={() => { setActiveTrack(t); setActiveTab("player"); }}
                    className={`p-4 rounded-xl border flex flex-col justify-between cursor-pointer transition ${
                      activeTrack?.id === t.id ? "border-rose-500 bg-rose-500/5" : "border-neutral-850 bg-black/10 hover:bg-neutral-850"
                    }`}
                  >
                    <div>
                      <h4 className="text-xs font-bold text-white truncate">{t.title}</h4>
                      <p className="text-[10px] text-neutral-400 mt-0.5">By {t.artist}</p>
                    </div>
                    <div className="flex justify-between items-center mt-4 border-t border-neutral-850/40 pt-2">
                      <span className="text-[9px] font-mono text-rose-400 uppercase">{t.genre}</span>
                      <LucideIcon name="play" className="w-3.5 h-3.5 text-rose-500" />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Guestbook reviews (Right 5-columns) */}
          <div className="lg:col-span-5 bg-neutral-900/40 border border-neutral-800 p-8 rounded-3xl space-y-6">
            <div>
              <h2 className="text-lg font-display font-bold text-white flex items-center gap-2">
                <LucideIcon name="message-square" className="w-5 h-5 text-rose-500" />
                <span>Listener Guestbook</span>
              </h2>
              <p className="text-xs text-neutral-450 mt-1">Leave logs or review rating profiles for this spotlight track.</p>
            </div>

            <form onSubmit={handleCommentSubmit} className="space-y-3.5">
              <div className="grid grid-cols-2 gap-3">
                <input required type="text" value={commentAuthor} onChange={e => setCommentAuthor(e.target.value)} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-white" placeholder="Username *" />
                <select value={commentRating} onChange={e => setCommentRating(Number(e.target.value))} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-white">
                  <option value={5}>⭐⭐⭐⭐⭐ 5 Stars</option>
                  <option value={4}>⭐⭐⭐⭐ 4 Stars</option>
                  <option value={3}>⭐⭐⭐ 3 Stars</option>
                  <option value={2}>⭐⭐ 2 Stars</option>
                  <option value={1}>⭐ 1 Star</option>
                </select>
              </div>

              <textarea required rows={2} value={commentContent} onChange={e => setCommentContent(e.target.value)} className="w-full bg-black/40 border border-neutral-800 rounded-xl px-3 py-2 text-xs text-white" placeholder="Add feedback logs..." />

              <button type="submit" className="w-full py-2.5 bg-neutral-850 hover:bg-neutral-800 text-neutral-200 hover:text-white rounded-xl text-xs font-semibold uppercase tracking-wider cursor-pointer">
                Log Listener Review
              </button>
            </form>

            <div className="space-y-3.5 pt-4 border-t border-neutral-850 text-left">
              <span className="text-[10px] font-mono text-neutral-500 uppercase tracking-widest block">Review Feed Logs</span>
              <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                {activeComments.map(c => (
                  <div key={c.id} className="bg-black/20 border border-neutral-850 p-4 rounded-xl space-y-1">
                    <div className="flex justify-between items-center">
                      <span className="text-xs font-bold text-white">{c.author}</span>
                      <span className="text-amber-500 font-mono">{"⭐".repeat(c.rating)}</span>
                    </div>
                    <p className="text-xs text-neutral-350 leading-relaxed font-sans">{c.content}</p>
                  </div>
                ))}
                {activeComments.length === 0 && <p className="text-xs text-neutral-500 italic">No feedback comments logged for this track yet.</p>}
              </div>
            </div>
          </div>

        </div>
      );
    }

    // Render the App
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
